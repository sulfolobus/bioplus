site_name: BioPlus - Life Science Platform
site_description: A popular science platform focusing on practical applications of life sciences
site_author: BioPlus Team
site_url: https://sulfolobus.github.io/bioplus/en

repo_url: https://github.com/sulfolobus/bioplus
repo_name: sulfolobus/bioplus

copyright: Copyright &copy; 2026 BioPlus

theme:
  name: material
  language: en
  palette:
    primary: teal
    accent: teal
  features:
    - navigation.instant
    - navigation.tabs
    - search.suggest
    - search.highlight

plugins:
  - search:
      prebuild_index: true
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sulfolobus/bioplus
  analytics:
    provider: google
    property: G-XXXXXXXXXX
  scripts:
    - ../assets/anti-copy.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - About: about.md
  - Project Documentation: PROJECT_DOC.md
  - Project Guide: PROJECT_GUIDE.md
  - Research Areas:
      - Gene Editing:
          - gene-editing/index.md
          - gene-editing/CRISPR-clinical.md
          - gene-editing/gene-therapy.md
      - Medical Diagnosis:
          - medical-diagnosis/index.md
          - medical-diagnosis/liquid-biopsy.md
          - medical-diagnosis/AI-diagnosis.md
      - Drug Development:
          - drug-development/index.md
          - drug-development/antibody-drugs.md
          - drug-development/AI-pharmaceuticals.md
      - Biotechnology:
          - biotechnology/index.md
          - biotechnology/synthetic-biology.md
          - biotechnology/cell-therapy.md
      - Neurodegenerative Diseases:
          - neurodegenerative-diseases/index.md
          - neurodegenerative-diseases/alzheimer.md
          - neurodegenerative-diseases/amnesia.md
      - Cardiovascular Diseases:
          - cardiovascular-diseases/index.md
          - cardiovascular-diseases/hypertension.md
      - Sensory Dysfunction:
          - sensory-dysfunction/index.md
          - sensory-dysfunction/blindness-treatment.md
          - sensory-dysfunction/brain-machine-interface.md
      - Turtle Disease:
          - turtle-disease/index.md
          - turtle-disease/comprehensive-treatment.md
          - turtle-disease/common-diagnosis.md
          - turtle-disease/turtle-nutrition.md
  - Research Groups: research-groups/index.md
  - Achievements: achievements/index.md
  - Popular Science: popular-science/index.md

docs_dir: docs/en
site_dir: site/en
