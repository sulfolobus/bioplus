site_name: BioPlus - Life Science Platform
site_description: A popular science platform focusing on practical applications of life sciences
site_author: BioPlus Team
site_url: https://sulfolobus.github.io/bioplus/en

repo_url: https://github.com/sulfolobus/bioplus
repo_name: sulfolobus/bioplus

copyright: Copyright &copy; 2026 BioPlus

theme:
  name: material
  language: en
  palette:
    primary: teal
    accent: teal
  features:
    - navigation.instant
    - navigation.tabs
    - search.suggest
    - search.highlight

plugins:
  - search:
      prebuild_index: true
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sulfolobus/bioplus
  alternate:
    - link: /bioplus/
      name: 中文
      lang: zh
    - link: /bioplus/en/
      name: English
      lang: en
  analytics:
    provider: google
    property: G-XXXXXXXXXX
  scripts:
    - ../assets/anti-copy.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

