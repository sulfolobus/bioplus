site_name: BioPlus - 生命科学实践应用平台
site_description: 聚焦生命科学实践应用领域，连接科研问题、研究组与研究成果
site_author: BioPlus Team
site_url: https://sulfolobus.github.io/bioplus

repo_url: https://github.com/sulfolobus/bioplus
repo_name: sulfolobus/bioplus

copyright: Copyright &copy; 2026 BioPlus

theme:
  name: material
  language: zh
  languages:
    zh: Chinese (中文)
    en: English (英文)
  palette:
    primary: teal
    accent: teal
  features:
    - navigation.instant
    - navigation.tabs
    - search.suggest
    - search.highlight
    - navigation.alternate

plugins:
  - search:
      prebuild_index: true
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sulfolobus/bioplus
  analytics:
    provider: google
    property: G-XXXXXXXXXX
  scripts:
    - assets/anti-copy.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - 首页: index.md
  - 关于我们: about.md
  - 项目文档: PROJECT_DOC.md
  - 研究领域:
      - 基因编辑应用:
          - gene-editing/index.md
          - gene-editing/CRISPR-clinical.md
          - gene-editing/gene-therapy.md
      - 医学诊断:
          - medical-diagnosis/index.md
          - medical-diagnosis/liquid-biopsy.md
          - medical-diagnosis/AI-diagnosis.md
      - 药物研发:
          - drug-development/index.md
          - drug-development/antibody-drugs.md
          - drug-development/AI-pharmaceuticals.md
      - 生物技术:
          - biotechnology/index.md
          - biotechnology/synthetic-biology.md
          - biotechnology/cell-therapy.md
      - 神经退化疾病:
          - neurodegenerative-diseases/index.md
          - neurodegenerative-diseases/alzheimer.md
          - neurodegenerative-diseases/amnesia.md
      - 心血管疾病:
          - cardiovascular-diseases/index.md
          - cardiovascular-diseases/hypertension.md
      - 感官功能障碍:
          - sensory-dysfunction/index.md
          - sensory-dysfunction/blindness-treatment.md
          - sensory-dysfunction/brain-machine-interface.md
  - 研究组: research-groups/index.md
  - 成果转化: achievements/index.md
  - 科普文章: popular-science/index.md
