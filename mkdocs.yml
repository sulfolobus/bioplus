site_name: BioPlus - Life Science Platform
site_description: A popular science platform focusing on practical applications of life sciences, connecting research problems, teams, and achievements
site_author: BioPlus Team
site_url: https://sulfolobus.github.io/bioplus

repo_url: https://github.com/sulfolobus/bioplus
repo_name: sulfolobus/bioplus

copyright: Copyright &copy; 2026 BioPlus

theme:
  name: material
  language: zh
  languages:
    zh: Chinese
    en: English
  palette:
    primary: teal
    accent: teal
  features:
    - navigation.instant
    - navigation.tabs
    - search.suggest
    - search.highlight
    - search.langauge

plugins:
  - search:
      lang: en
      prebuild_index: true
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sulfolobus/bioplus
  analytics:
    provider: google
    property: G-XXXXXXXXXX
  scripts:
    - assets/anti-copy.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home:
      zh: 首页
      en: Home
    link: index.md
  - About:
      zh: 关于我们
      en: About
    link: about.md
  - Project Documentation:
      zh: 项目文档
      en: Project Documentation
    link: PROJECT_DOC.md
  - Research Areas:
      zh: 研究领域
      en: Research Areas
      children:
        - Gene Editing:
            zh: 基因编辑应用
            en: Gene Editing
          children:
            - gene-editing/index.md
            - gene-editing/CRISPR-clinical.md
            - gene-editing/gene-therapy.md
        - Medical Diagnosis:
            zh: 医学诊断
            en: Medical Diagnosis
          children:
            - medical-diagnosis/index.md
            - medical-diagnosis/liquid-biopsy.md
            - medical-diagnosis/AI-diagnosis.md
        - Drug Development:
            zh: 药物研发
            en: Drug Development
          children:
            - drug-development/index.md
            - drug-development/antibody-drugs.md
            - drug-development/AI-pharmaceuticals.md
        - Biotechnology:
            zh: 生物技术
            en: Biotechnology
          children:
            - biotechnology/index.md
            - biotechnology/synthetic-biology.md
            - biotechnology/cell-therapy.md
        - Neurodegenerative Diseases:
            zh: 神经退化疾病
            en: Neurodegenerative Diseases
          children:
            - neurodegenerative-diseases/index.md
            - neurodegenerative-diseases/alzheimer.md
            - neurodegenerative-diseases/amnesia.md
        - Cardiovascular Diseases:
            zh: 心血管疾病
            en: Cardiovascular Diseases
          children:
            - cardiovascular-diseases/index.md
            - cardiovascular-diseases/hypertension.md
        - Sensory Dysfunction:
            zh: 感官功能障碍
            en: Sensory Dysfunction
          children:
            - sensory-dysfunction/index.md
            - sensory-dysfunction/blindness-treatment.md
            - sensory-dysfunction/brain-machine-interface.md
  - Research Groups:
      zh: 研究组
      en: Research Groups
    link: research-groups/index.md
  - Achievements:
      zh: 成果转化
      en: Achievements
    link: achievements/index.md
  - Popular Science:
      zh: 科普文章
      en: Popular Science
    link: popular-science/index.md
