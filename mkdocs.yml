site_name: BioPlus - 生命科学实践应用平台
site_description: 聚焦生命科学实践应用领域，连接科研问题、研究组与研究成果
site_author: BioPlus Team
site_url: https://sulfolobus.github.io/bioplus

repo_url: https://github.com/sulfolobus/bioplus
repo_name: sulfolobus/bioplus

copyright: Copyright &copy; 2026 BioPlus

theme:
  name: material
  language: zh
  palette:
    primary: teal
    accent: teal
  features:
    - navigation.instant
    - navigation.tabs
    - search.suggest
    - search.highlight

plugins:
  - search:
      prebuild_index: true
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/sulfolobus/bioplus
  alternate:
    - link: /
      name: English
      lang: en
    - link: /
      name: 中文
      lang: zh
  analytics:
    provider: google
    property: G-XXXXXXXXXX
  scripts:
    - assets/anti-copy.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
